name: Refresh Animal Spirits state

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "run.py"
      - "sources/**"
      - "normalise.py"
      - ".github/workflows/refresh.yml"

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compose state
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FRED_API_KEY:          ${{ secrets.FRED_API_KEY }}
        run: python run.py

      - name: Commit updated state
        run: |
          git config user.name  "animal-spirits-bot"
          git config user.email "bot@animal-spirits.local"
          git add data/state.json data/cache.json data/history.jsonl
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "state refresh: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            if git push origin main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Push failed after 3 attempts."
          exit 1
